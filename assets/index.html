<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="color-scheme" content="light">
  <meta name="description" content="Static source browser generated from SCIP">
  <script>
    (() => {
      const match = location.pathname.match(/^(.*\/)(?:index|404)\.html$/);
      const base = location.protocol === "file:" ? new URL("./", location.href).href : (match ? match[1] : "/");
      window.__SCIP_APP_BASE__ = base;
      const link = document.createElement("link");
      link.rel = "stylesheet";
      link.href = `${base}assets/style.css`;
      document.head.append(link);
    })();
  </script>
  <title>EXP</title>
</head>
<body>
  <header class="topbar">
    <a id="home-link" class="brand" href="/" aria-label="EXP home">
      <span class="brand-mark" aria-hidden="true">E</span>
      <span>EXP</span>
    </a>
    <nav class="primary-nav" aria-label="Primary navigation">
      <a id="nav-code" href="/">Code</a>
      <a id="nav-vulnerabilities" href="/vulnerabilities">Findings</a>
    </nav>
    <div class="header-context">
      <button id="menu" class="menu" aria-label="Toggle repository files">☰</button>
      <div class="view-nav" aria-label="View navigation" hidden>
      <button id="view-back" type="button" title="Back" aria-label="Back" disabled>←</button>
      <button id="view-forward" type="button" title="Forward" aria-label="Forward" disabled>→</button>
      </div>
      <div id="breadcrumb" class="breadcrumb">Repositories</div>
      <div id="stats" class="stats"></div>
    </div>
  </header>
  <div class="layout">
    <aside id="sidebar" class="sidebar">
      <div class="explorer-heading">
        <span>Files</span>
        <span class="heading-kicker">Index</span>
      </div>
      <label class="search-wrap">
        <span class="sr-only">Find a file</span>
        <span class="search-icon">⌕</span>
        <input id="search" type="search" placeholder="Search files" autocomplete="off" spellcheck="false">
      </label>
      <div id="file-list" class="file-list" role="navigation" aria-label="Source files"></div>
      <div id="file-note" class="file-note"></div>
    </aside>
    <main id="main" class="main">
      <div id="empty" class="empty">Choose a file to browse its source.</div>
      <section id="editor" class="editor" hidden>
        <div id="code" class="code" tabindex="0" aria-label="Source code">
          <div id="code-spacer" class="code-spacer"></div>
          <div id="code-window" class="code-window"></div>
        </div>
      </section>
    </main>
    <aside id="doc-panel" class="doc-panel" aria-label="Function documentation" hidden>
      <div id="doc-resizer" class="doc-resizer" role="separator" aria-label="Resize code and documentation panels" aria-orientation="vertical" tabindex="0"></div>
      <div class="doc-heading">
        <span>Function notes</span>
        <span id="doc-state" class="doc-state">No file selected</span>
      </div>
      <div id="doc-content" class="doc-content">
        <p class="doc-empty">Choose a source file to view its function documentation.</p>
      </div>
    </aside>
    <aside id="view-history" class="history-panel" aria-label="View history" hidden>
      <div class="history-heading">
        <span>History</span>
        <button id="clear-history" type="button" disabled>Clear</button>
      </div>
      <div id="history-list" class="history-list"></div>
    </aside>
  </div>
  <footer class="workbench-status" aria-label="Source status" hidden>
    <div class="status-left"><span><i class="status-dot" aria-hidden="true"></i> SCIP index ready</span></div>
    <div class="status-right"><span id="position-status">Ln 1, Col 1</span><span id="language-status">SCIP</span><span>Read only</span></div>
  </footer>
  <div id="status" class="status" role="status" aria-live="polite"></div>
  <script>
    (() => {
      const base = window.__SCIP_APP_BASE__ || "/";
      const app = () => {
        const script = document.createElement("script");
        script.src = `${base}assets/app.js`;
        document.body.append(script);
      };
      const catalog = document.createElement("script");
      catalog.src = `${base}generated/catalog.js`;
      catalog.onload = app;
      catalog.onerror = app;
      document.body.append(catalog);
    })();
  </script>
</body>
</html>
