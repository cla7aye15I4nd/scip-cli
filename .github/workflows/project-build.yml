name: Build one project

on:
  workflow_call:
    inputs:
      project:
        required: true
        type: string

permissions:
  actions: read
  contents: read

env:
  SCIP_CLANG_VERSION: v0.4.0

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6

      - name: Download converter
        uses: actions/download-artifact@v4
        with:
          name: scip-cli-bin
          path: bin

      - name: Install system dependencies
        run: |
          chmod 755 bin/scip-cli
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends \
            bear clang cmake curl libbrotli-dev libfreetype-dev libjpeg-dev \
            liblzma-dev libpcre2-dev libpng-dev libssl-dev libwebp-dev \
            ninja-build pkg-config tcl zlib1g-dev

      - name: Download scip-clang
        run: |
          curl --fail --location --retry 3 \
            --output "$RUNNER_TEMP/scip-clang" \
            "https://github.com/sourcegraph/scip-clang/releases/download/${SCIP_CLANG_VERSION}/scip-clang-x86_64-linux"
          chmod 755 "$RUNNER_TEMP/scip-clang"

      - name: Build and index project
        env:
          PROJECT_JSON: ${{ inputs.project }}
        run: .github/scripts/build-project.sh

      - name: Upload project fragment
        uses: actions/upload-artifact@v4
        with:
          name: project-${{ fromJSON(inputs.project).name }}
          path: fragment
          retention-days: 1
