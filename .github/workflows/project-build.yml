name: Build one project

on:
  workflow_call:
    inputs:
      project:
        required: true
        type: string

permissions:
  actions: read
  contents: read

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    env:
      CCACHE_DIR: ${{ github.workspace }}/.ccache
      CCACHE_MAXSIZE: 300M
    steps:
      - uses: actions/checkout@v6

      - name: Download build tools
        uses: actions/download-artifact@v4
        with:
          name: build-tools
          path: bin

      - name: Install system dependencies
        run: |
          chmod 755 bin/scip-cli bin/scip-clang
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends \
            bear ccache clang cmake curl libbrotli-dev libfreetype-dev libjpeg-dev \
            liblzma-dev libpcre2-dev libpng-dev libssl-dev libwebp-dev \
            meson nasm ninja-build pkg-config tcl zlib1g-dev

      - name: Restore compiler cache
        uses: actions/cache@v4
        with:
          path: .ccache
          key: ${{ runner.os }}-ccache-${{ fromJSON(inputs.project).name }}-${{ fromJSON(inputs.project).commit }}-${{ fromJSON(inputs.project).configHash }}

      - name: Build and index project
        env:
          PROJECT_JSON: ${{ inputs.project }}
        run: .github/scripts/build-project.sh

      - name: Upload project fragment
        uses: actions/upload-artifact@v4
        with:
          name: project-${{ fromJSON(inputs.project).name }}
          path: fragment
          retention-days: 1
