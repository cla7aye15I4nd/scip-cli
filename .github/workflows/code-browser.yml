name: Build code browser

on:
  workflow_dispatch:
  schedule:
    - cron: "23 4 * * 0"
  pull_request:
    paths:
      - ".github/**"
      - "assets/**"
      - "src/**"
      - "Cargo.toml"
      - "Cargo.lock"
  push:
    branches: [main]
    paths:
      - ".github/**"
      - "assets/**"
      - "src/**"
      - "Cargo.toml"
      - "Cargo.lock"

concurrency:
  group: code-browser-${{ github.ref }}
  cancel-in-progress: true

permissions:
  actions: read
  contents: read
  deployments: write

env:
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  PAGES_PROJECT: scip-cli

jobs:
  plan:
    runs-on: ubuntu-24.04
    outputs:
      projects: ${{ steps.plan.outputs.projects }}
      count: ${{ steps.plan.outputs.count }}
    steps:
      - uses: actions/checkout@v6

      - name: Restore the previous catalog
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          run_id=$(gh run list \
            --workflow code-browser.yml \
            --branch main \
            --status success \
            --limit 1 \
            --json databaseId \
            --jq '.[0].databaseId // empty')
          if [[ -n "$run_id" ]]; then
            gh run download "$run_id" --name code-browser-state --dir previous-site
          fi

      - name: Select projects
        id: plan
        env:
          EVENT_NAME: ${{ github.event_name }}
        run: .github/scripts/plan-projects.sh

  prepare:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - name: Select Rust 1.88
        run: |
          rustup toolchain install 1.88 --profile minimal
          rustup override set 1.88
      - name: Test and build converter
        run: |
          cargo test --locked --workspace --all-targets
          cargo clippy --locked --workspace --all-targets -- -D warnings
          cargo build --release --locked --bin scip-cli
      - name: Share converter
        uses: actions/upload-artifact@v4
        with:
          name: scip-cli-bin
          path: target/release/scip-cli
          retention-days: 1

  build-project:
    needs: [plan, prepare]
    if: needs.plan.outputs.count != '0'
    strategy:
      fail-fast: false
      max-parallel: 10
      matrix:
        project: ${{ fromJSON(needs.plan.outputs.projects) }}
    uses: ./.github/workflows/project-build.yml
    with:
      project: ${{ toJSON(matrix.project) }}

  assemble:
    needs: [plan, prepare, build-project]
    if: always() && needs.plan.result == 'success' && needs.prepare.result == 'success' && (needs.build-project.result == 'success' || needs.build-project.result == 'skipped')
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - name: Restore the previous production site
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          run_id=$(gh run list \
            --workflow code-browser.yml \
            --branch main \
            --status success \
            --limit 1 \
            --json databaseId \
            --jq '.[0].databaseId // empty')
          if [[ -n "$run_id" ]]; then
            gh run download "$run_id" --name code-browser-state --dir site
          fi

      - name: Download project fragments
        if: needs.plan.outputs.count != '0'
        uses: actions/download-artifact@v4
        with:
          pattern: project-*
          path: incoming

      - name: Assemble site
        run: .github/scripts/assemble-site.sh site incoming

      - name: Validate site
        run: |
          test -s site/generated/catalog.json
          test "$(jq '.projects | length' site/generated/catalog.json)" -eq 10
          test "$(jq '[.projects[].commits | length] | max' site/generated/catalog.json)" -le 2
          file_count=$(find site -type f | wc -l)
          largest_file=$(find site -type f -printf '%s\n' | sort -nr | head -1)
          test "$file_count" -le 20000
          test "$largest_file" -le 26214400
          du -sh site
          echo "Validated $file_count files; largest file is $largest_file bytes"

      - name: Smoke-test source rendering in Chrome
        run: |
          commit=$(jq -r '.projects[] | select(.slug == "github-com-madler-zlib") | .commits[0].commit' site/generated/catalog.json)
          python3 -m http.server 8080 --directory site > "$RUNNER_TEMP/http.log" 2>&1 &
          server_pid=$!
          trap 'kill "$server_pid"' EXIT
          google-chrome --headless --no-sandbox --disable-gpu \
            --virtual-time-budget=5000 --dump-dom \
            "http://127.0.0.1:8080/#/github-com-madler-zlib/$commit/adler32.c?line=0" \
            > "$RUNNER_TEMP/source-dom.html"
          grep --quiet "compute the Adler-32 checksum" "$RUNNER_TEMP/source-dom.html"

      - name: Keep preview artifact
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: code-browser-preview
          path: site
          retention-days: 1

      - name: Keep production state
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: code-browser-state
          path: site
          retention-days: 14

      - name: Deploy to Cloudflare Pages
        if: github.event_name != 'pull_request' && env.CLOUDFLARE_ACCOUNT_ID != '' && env.CLOUDFLARE_API_TOKEN != ''
        uses: cloudflare/wrangler-action@v3
        with:
          accountId: ${{ env.CLOUDFLARE_ACCOUNT_ID }}
          apiToken: ${{ env.CLOUDFLARE_API_TOKEN }}
          command: pages deploy site --project-name=${{ env.PAGES_PROJECT }} --branch=main
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}

      - name: Report skipped Cloudflare deployment
        if: github.event_name != 'pull_request' && (env.CLOUDFLARE_ACCOUNT_ID == '' || env.CLOUDFLARE_API_TOKEN == '')
        run: echo "::warning::Cloudflare deployment skipped because its repository secrets are not configured."
