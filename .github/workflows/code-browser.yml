name: Build code browser

on:
  workflow_dispatch:
    inputs:
      force_rebuild:
        description: Rebuild projects even when the upstream commit is already indexed
        required: false
        type: boolean
        default: false
  schedule:
    - cron: "23 4 * * 0"
  pull_request:
    paths:
      - ".github/**"
      - "assets/**"
      - "worker/**"
      - "wrangler.jsonc"
      - "src/**"
      - "Cargo.toml"
      - "Cargo.lock"
  push:
    branches: [main]
    paths:
      - ".github/**"
      - "assets/**"
      - "worker/**"
      - "wrangler.jsonc"
      - "src/**"
      - "Cargo.toml"
      - "Cargo.lock"

concurrency:
  group: code-browser-${{ github.ref }}
  cancel-in-progress: true

permissions:
  actions: read
  contents: read
  deployments: write

env:
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  PAGES_PROJECT: scip-cli
  R2_BUCKET: scip-cli-data

jobs:
  plan:
    runs-on: ubuntu-24.04
    outputs:
      projects: ${{ steps.plan.outputs.projects }}
      count: ${{ steps.plan.outputs.count }}
    steps:
      - uses: actions/checkout@v6

      - name: Test same-origin R2 route
        run: node --test worker/r2-data.test.mjs

      - name: Require Cloudflare deployment credentials
        if: github.event_name != 'pull_request'
        run: |
          if [[ -z "$CLOUDFLARE_ACCOUNT_ID" || -z "$CLOUDFLARE_API_TOKEN" ]]; then
            echo "::error::CLOUDFLARE_ACCOUNT_ID and CLOUDFLARE_API_TOKEN are required for production runs."
            exit 1
          fi

      - name: Require R2 access
        if: github.event_name != 'pull_request'
        run: npx --yes wrangler@4.107.0 r2 bucket info "$R2_BUCKET"

      - name: Restore the previous catalog
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          restored=false
          if [[ "$GITHUB_EVENT_NAME" == pull_request && -n "$GITHUB_HEAD_REF" ]]; then
            run_id=$(gh run list \
              --workflow code-browser.yml \
              --branch "$GITHUB_HEAD_REF" \
              --status success \
              --limit 1 \
              --json databaseId \
              --jq '.[0].databaseId // empty')
            if [[ -n "$run_id" ]] && gh run download "$run_id" --name code-browser-preview --dir previous-site; then
              echo "Restored preview catalog from run $run_id"
              restored=true
            fi
          fi
          if [[ "$restored" == false ]]; then
            run_id=$(gh run list \
              --workflow code-browser.yml \
              --branch main \
              --status success \
              --limit 1 \
              --json databaseId \
              --jq '.[0].databaseId // empty')
            if [[ -n "$run_id" ]]; then
              mkdir -p previous-site/generated
              gh run download "$run_id" --name code-browser-catalog --dir previous-site/generated || true
              echo "Restored production catalog from run $run_id"
            fi
          fi

      - name: Select projects
        id: plan
        env:
          FORCE_REBUILD: ${{ inputs.force_rebuild || false }}
        run: |
          projects='[]'
          previous_catalog=previous-site/generated/catalog.json
          while IFS= read -r config; do
            project=$(ruby -ryaml -rjson -e 'data = YAML.safe_load_file(ARGV[0]); data.delete("build"); puts JSON.generate(data)' "$config")
            name=$(jq -r .name <<< "$project")
            if [[ "${config##*/}" != "$name.yaml" ]]; then
              echo "Project name $name does not match $config" >&2
              exit 1
            fi
            repo_url=$(jq -r .repoUrl <<< "$project")
            commit=$(git ls-remote "$repo_url" HEAD | awk 'NR == 1 { print $1 }')
            config_hash=$(sha256sum "$config" | awk '{ print $1 }')
            project=$(jq --compact-output \
              --arg commit "$commit" \
              --arg config_hash "$config_hash" \
              '. + {commit: $commit, configHash: $config_hash}' <<< "$project")
            build=true
            if [[ "$FORCE_REBUILD" != true && -s "$previous_catalog" ]]; then
              if jq --exit-status \
                --arg repo_url "$repo_url" \
                --arg commit "$commit" \
                '.version == 2 and any(.projects[];
                  .repoUrl == $repo_url and any(.commits[]; .commit == $commit))' \
                "$previous_catalog" > /dev/null; then
                build=false
                echo "$name is already indexed at $commit" >&2
              fi
            fi
            if [[ "$build" == true ]]; then
              projects=$(jq --compact-output --argjson project "$project" '. + [$project]' <<< "$projects")
            fi
          done < <(find .github/projects -mindepth 1 -maxdepth 1 -name '*.yaml' -type f | sort)

          echo "projects=$projects" >> "$GITHUB_OUTPUT"
          echo "count=$(jq 'length' <<< "$projects")" >> "$GITHUB_OUTPUT"
          jq -r '.[].name' <<< "$projects"

  prepare:
    needs: plan
    if: needs.plan.outputs.count != '0'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - name: Select Rust 1.88
        run: |
          rustup toolchain install 1.88 --profile minimal
          rustup override set 1.88
          rustup component add clippy --toolchain 1.88
      - name: Restore Cargo cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}
      - name: Test and build converter
        run: |
          cargo test --locked --workspace --all-targets
          cargo clippy --locked --workspace --all-targets -- -D warnings
          cargo build --release --locked --bin scip-cli
      - name: Download scip-clang
        env:
          SCIP_CLANG_VERSION: v0.4.0
        run: |
          mkdir -p dist
          cp target/release/scip-cli dist/scip-cli
          curl --fail --location --retry 3 \
            --output dist/scip-clang \
            "https://github.com/sourcegraph/scip-clang/releases/download/${SCIP_CLANG_VERSION}/scip-clang-x86_64-linux"
          chmod 755 dist/scip-cli dist/scip-clang
      - name: Share build tools
        uses: actions/upload-artifact@v4
        with:
          name: build-tools
          path: dist
          retention-days: 1

  build-project:
    needs: [plan, prepare]
    if: needs.plan.outputs.count != '0'
    strategy:
      fail-fast: false
      max-parallel: 10
      matrix:
        project: ${{ fromJSON(needs.plan.outputs.projects) }}
    uses: ./.github/workflows/project-build.yml
    with:
      project: ${{ toJSON(matrix.project) }}

  assemble:
    needs: [plan, prepare, build-project]
    if: always() && needs.plan.result == 'success' && (needs.prepare.result == 'success' || needs.prepare.result == 'skipped') && (needs.build-project.result == 'success' || needs.build-project.result == 'skipped')
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - name: Restore the previous production site
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          restored=false
          if [[ "$GITHUB_EVENT_NAME" == pull_request && -n "$GITHUB_HEAD_REF" ]]; then
            run_id=$(gh run list \
              --workflow code-browser.yml \
              --branch "$GITHUB_HEAD_REF" \
              --status success \
              --limit 1 \
              --json databaseId \
              --jq '.[0].databaseId // empty')
            if [[ -n "$run_id" ]] && gh run download "$run_id" --name code-browser-preview --dir site; then
              echo "Restored preview state from run $run_id"
              restored=true
            fi
          fi
          if [[ "$restored" == false ]]; then
            run_id=$(gh run list \
              --workflow code-browser.yml \
              --branch main \
              --status success \
              --limit 1 \
              --json databaseId \
              --jq '.[0].databaseId // empty')
            if [[ -n "$run_id" ]]; then
              gh run download "$run_id" --name code-browser-state --dir site || true
              echo "Restored production state from run $run_id"
            fi
          fi

      - name: Download project fragments
        if: needs.plan.outputs.count != '0'
        uses: actions/download-artifact@v4
        with:
          pattern: project-*
          path: incoming

      - name: Assemble site
        run: |
          mkdir -p site/assets site/generated
          cp assets/index.html site/index.html
          cp assets/index.html site/404.html
          cp assets/app.js site/assets/app.js
          cp assets/style.css site/assets/style.css

          catalog=site/generated/catalog.json
          if [[ ! -s "$catalog" ]] || ! jq --exit-status '.version == 2' "$catalog" > /dev/null; then
            rm -rf site/generated
            mkdir -p site/generated
            printf '{"version":2,"projects":[]}' > "$catalog"
          fi

          if [[ -d incoming ]]; then
            while IFS= read -r fragment_catalog; do
              fragment_dir=${fragment_catalog%/generated/catalog.json}
              project=$(jq --compact-output '.projects[0]' "$fragment_catalog")
              slug=$(jq -r .slug <<< "$project")
              commit=$(jq -r '.commits[0].commit' <<< "$project")
              mkdir -p "site/generated/$slug"
              rm -rf "site/generated/$slug/$commit"
              cp -a "$fragment_dir/generated/$slug/$commit" "site/generated/$slug/$commit"
              jq --argjson new "$project" '
                (.projects // []) as $projects |
                .version = 2 |
                .projects = (($projects | map(select(.slug != $new.slug))) +
                  [$new | .commits = .commits[:1]] | sort_by(.slug))
              ' "$catalog" > "$catalog.tmp"
              mv "$catalog.tmp" "$catalog"
            done < <(find incoming -path '*/generated/catalog.json' -type f | sort)
          fi

          while IFS= read -r manifest; do
            commit_dir=${manifest%/manifest.json}
            pack_url="/data/${commit_dir#site/}/data.pack"
            jq --arg pack_url "$pack_url" '.packUrl = $pack_url' "$manifest" > "$manifest.tmp"
            mv "$manifest.tmp" "$manifest"
          done < <(find site/generated -mindepth 3 -maxdepth 3 -name manifest.json -type f | sort)

          while IFS= read -r project_dir; do
            slug=${project_dir##*/}
            while IFS= read -r commit_dir; do
              commit=${commit_dir##*/}
              if ! jq --exit-status --arg slug "$slug" --arg commit "$commit" \
                '.projects[] | select(.slug == $slug) | .commits[0] | select(.commit == $commit)' \
                "$catalog" > /dev/null; then
                rm -rf "$commit_dir"
              fi
            done < <(find "$project_dir" -mindepth 1 -maxdepth 1 -type d ! -name '.*')
          done < <(find site/generated -mindepth 1 -maxdepth 1 -type d ! -name '.*')

      - name: Validate site
        run: |
          test -s site/generated/catalog.json
          expected_projects=$(find .github/projects -mindepth 1 -maxdepth 1 -name '*.yaml' -type f | wc -l)
          test "$(jq '.version' site/generated/catalog.json)" -eq 2
          test "$(jq '.projects | length' site/generated/catalog.json)" -eq "$expected_projects"
          test "$(jq '[.projects[].commits | length] | max' site/generated/catalog.json)" -eq 1
          test "$(find site/generated -mindepth 3 -maxdepth 3 -name manifest.json -type f | wc -l)" -eq "$expected_projects"
          while IFS= read -r manifest; do
            pack_url=$(jq -r .packUrl "$manifest")
            expected="${manifest%/manifest.json}/data.pack"
            test "$pack_url" = "/data/${expected#site/}"
          done < <(find site/generated -mindepth 3 -maxdepth 3 -name manifest.json -type f | sort)
          du -sh site
          echo "Validated $expected_projects single-version project manifests"

      - name: Smoke-test source rendering in Chrome
        if: needs.plan.outputs.count != '0'
        run: |
          pack=$(find site/generated -mindepth 3 -maxdepth 3 -name data.pack -type f -print -quit)
          test -n "$pack"
          commit_dir=${pack%/data.pack}
          manifest=$commit_dir/manifest.json
          commit=${commit_dir##*/}
          slug=${commit_dir%/*}
          slug=${slug##*/}
          source_path=$(jq -r '.files[0].path' "$manifest")
          mkdir -p site/data
          ln -s ../generated site/data/generated
          python3 -m http.server 8080 --directory site > "$RUNNER_TEMP/http.log" 2>&1 &
          server_pid=$!
          trap 'kill "$server_pid"; rm -f site/data/generated; rmdir site/data' EXIT
          timeout --signal=TERM 45s google-chrome --headless --no-sandbox --disable-gpu \
            --virtual-time-budget=5000 --dump-dom \
            "http://127.0.0.1:8080/#/$slug/$commit/$source_path?line=0" \
            > "$RUNNER_TEMP/source-dom.html"
          grep --quiet 'class="source"' "$RUNNER_TEMP/source-dom.html"

      - name: Keep preview artifact
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: code-browser-preview
          path: site
          retention-days: 1

      - name: Install Wrangler
        if: github.event_name != 'pull_request'
        run: npm install --global wrangler@4.107.0

      - name: Publish immutable project packs to R2
        if: github.event_name != 'pull_request'
        run: |
          uploaded=0
          while IFS= read -r file; do
            key=${file#site/}
            echo "Uploading $key to R2"
            wrangler r2 object put "$R2_BUCKET/$key" \
              --remote \
              --file "$file" \
              --content-type application/octet-stream \
              --cache-control 'public, max-age=31536000, immutable'
            uploaded=$((uploaded + 1))
          done < <(find site/generated -mindepth 3 -maxdepth 3 -name data.pack -type f | sort)
          find site -name data.pack -type f -delete
          echo "Published $uploaded immutable project packs to R2"

      - name: Deploy same-origin R2 route
        if: github.event_name != 'pull_request'
        run: wrangler deploy --config wrangler.jsonc

      - name: Validate Pages payload
        if: github.event_name != 'pull_request'
        run: |
          test "$(find site -name data.pack -type f | wc -l)" -eq 0
          test "$(find site/generated -mindepth 3 -maxdepth 3 -name manifest.json -type f | wc -l)" -eq "$(jq '.projects | length' site/generated/catalog.json)"
          jq --exit-status --slurp --slurpfile catalog site/generated/catalog.json '
            all(.[].packUrl; startswith("/data/generated/")) and
            (length == ($catalog[0].projects | length))
          ' site/generated/*/*/manifest.json > /dev/null
          file_count=$(find site -type f | wc -l)
          largest_file=$(find site -type f -printf '%s\n' | sort -nr | head -1)
          test "$file_count" -le 20000
          test "$largest_file" -le 26214400
          echo "Validated Pages payload: $file_count files; largest is $largest_file bytes"

      - name: Keep production state
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: code-browser-state
          path: site
          retention-days: 14

      - name: Keep production catalog
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: code-browser-catalog
          path: site/generated/catalog.json
          retention-days: 14

      - name: Deploy to Cloudflare Pages
        if: github.event_name != 'pull_request'
        run: wrangler pages deploy site --project-name="$PAGES_PROJECT" --branch=main --commit-dirty=true
