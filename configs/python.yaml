extends: bases/configure-make.yaml

name: python
description: CPython interpreter and standard-library extension modules

repository:
  url: https://github.com/python/cpython.git
  directory: cpython
  depth: 1

variables:
  configure_args: >-
    --without-ensurepip
    --disable-test-modules

# compiledb's recursive dry-run does not terminate on CPython's self-regenerating
# Makefile. Intercept the real compiler processes instead.
commands:
  - name: Configure CPython
    cwd: "{repo_dir}"
    run: |
      mkdir -p "{repo_dir}/{build_dir}"
      cd "{repo_dir}/{build_dir}"
      "{repo_dir}/{configure_script}" {configure_args}

  - name: Build and capture the compilation database
    cwd: "{repo_dir}/{build_dir}"
    run: |
      make clean
      bear -o "{repo_dir}/{build_dir}/compile_commands.json" -- make -j{jobs} {make_args}
