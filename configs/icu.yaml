extends: bases/configure-make.yaml
name: icu
description: ICU Unicode and internationalization library used by Chromium
repository:
  url: https://github.com/unicode-org/icu.git
  directory: icu
  depth: 1
variables:
  configure_script: icu4c/source/configure
commands:
  - name: Reset the ICU build directory
    cwd: "{repo_dir}"
    run: rm -rf "{repo_dir}/{build_dir}"
  - name: Configure ICU with its default feature set
    cwd: "{repo_dir}"
    run: |
      mkdir -p "{repo_dir}/{build_dir}"
      cd "{repo_dir}/{build_dir}"
      CC="ccache clang" CXX="ccache clang++" "{repo_dir}/{configure_script}"
  - name: Build ICU and capture the compilation database
    cwd: "{repo_dir}/{build_dir}"
    run: bear --output "{repo_dir}/{build_dir}/compile_commands.json" -- make -j{jobs}
