version: 1
name: nginx
description: NGINX HTTP and reverse proxy server

repository:
  url: https://github.com/nginx/nginx.git
  directory: nginx
  depth: 1

variables:
  build_dir: build-scip
  compiledb_venv: "{tools_dir}/compiledb-venv"
  compiledb_version: "0.10.7"

path_prepend:
  - "{compiledb_venv}/bin"

commands:
  - name: Install the Make compilation-database helper
    cwd: "{tools_dir}"
    run: |
      if ! "{compiledb_venv}/bin/compiledb" --version >/dev/null 2>&1; then
        rm -rf "{compiledb_venv}"
        python3 -m venv "{compiledb_venv}"
        "{compiledb_venv}/bin/pip" install "compiledb=={compiledb_version}"
      fi

  - name: Configure NGINX
    cwd: "{repo_dir}"
    run: >-
      CC="ccache clang" ./auto/configure
      --with-cc=clang
      --with-cc-opt=-O2

  - name: Build NGINX and capture the compilation database
    cwd: "{repo_dir}"
    run: >-
      compiledb -o "{repo_dir}/{build_dir}/compile_commands.json"
      make -j{jobs}

index:
  compilation_database: "{repo_dir}/{build_dir}/compile_commands.json"
  output: "{output_dir}/nginx.scip"
  arguments:
    - --no-progress-report
