version: 1

variables:
  source_dir: "."
  build_dir: build-scip
  cmake_args: "-DCMAKE_BUILD_TYPE=Release"
  build_args: ""

commands:
  - name: Configure CMake project
    cwd: "{repo_dir}"
    run: |
      rm -f "{repo_dir}/{build_dir}/CMakeCache.txt"
      rm -rf "{repo_dir}/{build_dir}/CMakeFiles"
      cmake -S "{repo_dir}/{source_dir}" -B "{repo_dir}/{build_dir}" -G Ninja \
      -DCMAKE_EXPORT_COMPILE_COMMANDS=ON \
      -DCMAKE_C_COMPILER=clang \
      -DCMAKE_CXX_COMPILER=clang++ \
      -DCMAKE_C_COMPILER_LAUNCHER=ccache \
      -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
      {cmake_args}

  - name: Build CMake project and generated sources
    cwd: "{repo_dir}"
    run: >-
      cmake --build "{repo_dir}/{build_dir}"
      --parallel {jobs}
      {build_args}

  - name: Ensure a CMake compilation database exists
    cwd: "{repo_dir}"
    run: |
      test -s "{repo_dir}/{build_dir}/compile_commands.json" || \
        ninja -C "{repo_dir}/{build_dir}" -t compdb > "{repo_dir}/{build_dir}/compile_commands.json"

index:
  compilation_database: "{repo_dir}/{build_dir}/compile_commands.json"
  output: "{output_dir}/{name}.scip"
  arguments:
    - --no-progress-report
