version: 1
name: skia
description: Skia 2D graphics engine used by Chromium
repository:
  url: https://skia.googlesource.com/skia.git
  directory: skia
  depth: 1
tools:
  - name: depot_tools
    repository: https://chromium.googlesource.com/chromium/tools/depot_tools.git
    destination: depot_tools
    depth: 1
path_prepend:
  - "{tools_dir}/depot_tools"
variables:
  build_dir: out/scip
commands:
  - name: Synchronize Skia dependencies
    run: python3 tools/git-sync-deps
  - name: Generate Skia build
    run: >-
      bin/gn gen {build_dir}
      --args='is_debug=false is_official_build=true skia_use_system_expat=false skia_use_system_freetype2=false skia_use_system_harfbuzz=false skia_use_system_icu=false skia_use_system_libjpeg_turbo=false skia_use_system_libpng=false skia_use_system_libwebp=false skia_use_system_zlib=false cc_wrapper="ccache"'
  - name: Build Skia and generated sources
    run: ninja -C {build_dir} -j {jobs} skia
  - name: Export Skia compilation database
    run: ninja -C {build_dir} -t compdb cc cxx > {build_dir}/compile_commands.json
index:
  compilation_database: "{repo_dir}/{build_dir}/compile_commands.json"
  output: "{output_dir}/skia.scip"
  arguments:
    - --no-progress-report
