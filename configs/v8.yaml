version: 1
name: v8
description: V8 JavaScript engine (depot_tools/GN/Ninja profile)

repository:
  url: "{v8_url}"
  directory: v8
  depth: 1

tools:
  - name: depot_tools
    repository: https://chromium.googlesource.com/chromium/tools/depot_tools.git
    destination: depot_tools
    depth: 1

path_prepend:
  - "{tools_dir}/depot_tools"

variables:
  v8_url: https://chromium.googlesource.com/v8/v8.git
  build_dir: out/scip

commands:
  - name: Configure the gclient workspace
    cwd: "{work_dir}"
    run: >-
      test -f .gclient ||
      gclient config --name=v8 --unmanaged
      {v8_url}

  - name: Synchronize V8 dependencies
    cwd: "{work_dir}"
    run: gclient sync --no-history

  - name: Generate V8 build and compilation database
    cwd: "{repo_dir}"
    run: >-
      gn gen {build_dir}
      --args='is_debug=false is_component_build=false symbol_level=0 v8_symbol_level=0 clang_use_chrome_plugins=false'
      --export-compile-commands

  - name: Build V8 and generated sources
    cwd: "{repo_dir}"
    run: autoninja -C {build_dir} -j {jobs} d8

  - name: Normalize V8 compilation database for scip-clang
    cwd: "{repo_dir}"
    run: |
      jq --arg root "{repo_dir}" '
        map(
          .file = (
            if (.file | startswith("../../")) then
              $root + "/" + (.file | ltrimstr("../../"))
            elif (.file | startswith("/")) then
              .file
            else
              .directory + "/" + .file
            end
          )
          | .command |= gsub(" -fdiagnostics-show-inlining-chain"; "")
          | .command |= gsub(" -fno-lifetime-dse"; "")
          | .command |= gsub(" -fsanitize-ignore-for-ubsan-feature=[^ ]+"; "")
        )
      ' {build_dir}/compile_commands.json > {build_dir}/compile_commands.scip.json

index:
  compilation_database: "{repo_dir}/{build_dir}/compile_commands.scip.json"
  output: "{output_dir}/v8.scip"
  arguments:
    - --no-progress-report
