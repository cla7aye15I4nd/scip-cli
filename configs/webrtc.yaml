version: 1
name: webrtc
description: WebRTC real-time media stack used by Chromium
repository:
  url: https://webrtc.googlesource.com/src.git
  directory: webrtc-work/src
  depth: 1
tools:
  - name: depot_tools
    repository: https://chromium.googlesource.com/chromium/tools/depot_tools.git
    destination: depot_tools
    depth: 1
path_prepend:
  - "{tools_dir}/depot_tools"
variables:
  webrtc_url: https://webrtc.googlesource.com/src.git
  build_dir: out/scip
commands:
  - name: Configure the WebRTC gclient workspace
    cwd: "{repo_dir}/.."
    run: test -f .gclient || gclient config --name=src --unmanaged {webrtc_url}
  - name: Synchronize WebRTC dependencies
    cwd: "{repo_dir}/.."
    run: gclient sync --no-history
  - name: Generate WebRTC build and compilation database
    run: >-
      gn gen {build_dir}
      --args='is_debug=false is_component_build=false symbol_level=0 rtc_include_tests=false use_remoteexec=false cc_wrapper="ccache"'
      --export-compile-commands=webrtc
  - name: Build WebRTC and generated sources
    run: |
      autoninja -C {build_dir} -j {jobs} webrtc
      jq 'map(if .command then
        .command |= sub("^ccache "; "")
        | .command |= gsub(" -fdiagnostics-show-inlining-chain"; "")
        | .command |= gsub(" -fno-lifetime-dse"; "")
        | .command |= gsub(" -fsanitize-ignore-for-ubsan-feature=[^ ]+"; "")
        | .command |= gsub(" -Xclang -add-plugin -Xclang [^ ]+"; "")
        | .command |= gsub(" -Xclang -plugin-arg-[^ ]+ -Xclang [^ ]+"; "")
      else . end)' \
        "{build_dir}/compile_commands.json" > "{build_dir}/compile_commands.scip.json"
index:
  compilation_database: "{repo_dir}/{build_dir}/compile_commands.scip.json"
  output: "{output_dir}/webrtc.scip"
  arguments:
    - --no-progress-report
